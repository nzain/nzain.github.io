<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Spell Card Generator</title>
  <script src="js/config.js"></script>
  <link rel="stylesheet" href="css/app.css">
</head>
<body>
  <header class="toolbar" id="toolbar">
    <h1 class="app-title" data-i18n="appTitle">Spell Card Generator</h1>
    <div class="toolbar-row">
      <select id="ui-lang" data-i18n-aria="uiLanguage" aria-label="UI language">
        <option value="en">English</option>
        <option value="de">Deutsch</option>
      </select>
      <div class="file-actions">
        <button type="button" id="btn-open" data-i18n="openCsv">Open CSV…</button>
        <button type="button" id="btn-add-spell" data-i18n="addSpell">Add spell…</button>
        <button type="button" id="btn-export" disabled data-i18n="exportCsv">Export CSV…</button>
        <button type="button" id="btn-print" disabled>Print</button>
        <input type="file" id="file-input" accept=".csv,text/csv" hidden>
      </div>
      <label class="toolbar-field">
        <span data-i18n="cardWidth">Card width (mm)</span>
        <input type="number" id="card-width" min="40" max="100">
      </label>
      <label class="toolbar-field">
        <span data-i18n="cardHeight">Card height (mm)</span>
        <input type="number" id="card-height" min="50" max="150">
      </label>
    </div>
    <div class="toolbar-row filter-row" id="level-filter-row">
      <span class="filter-label" data-i18n="levelFilter">Levels:</span>
      <div class="filter-actions">
        <button type="button" id="level-all" data-i18n="filterAll">All</button>
        <button type="button" id="level-none" data-i18n="filterNone">None</button>
      </div>
      <div class="filter-chips" id="level-filter-chips" role="group" data-i18n-aria="levelFilter"></div>
    </div>
    <div class="toolbar-row filter-row" id="class-filter-row" hidden>
      <span class="filter-label" data-i18n="classFilter">Classes:</span>
      <div class="filter-actions">
        <button type="button" id="class-all" data-i18n="filterAll">All</button>
        <button type="button" id="class-none" data-i18n="filterNone">None</button>
      </div>
      <div class="filter-chips" id="class-filter-chips" role="group" data-i18n-aria="classFilter"></div>
    </div>
  </header>

  <aside class="status" id="status" role="status">
    <div class="status-content">
      <span class="status-message" id="status-message"></span>
      <button type="button" id="btn-clear-selection" class="status-action" data-i18n="clearSelection">Clear selection</button>
    </div>
  </aside>
  <div class="log-panel" id="log-panel" hidden></div>

  <main class="cards-grid" id="cards-grid"></main>

  <section id="description-editor" class="description-editor" hidden>
    <div class="editor-form">
      <div class="editor-row editor-row--name">
        <label class="editor-field editor-field--level">
          <span class="editor-field-label" data-i18n="levelLabel">Level</span>
          <select id="editor-level"></select>
        </label>
        <label class="editor-field editor-field--name">
          <span class="editor-field-label" data-i18n="nameLabel">Name</span>
          <input type="text" id="editor-name" autocomplete="off" spellcheck="false">
        </label>
        <div class="editor-field editor-field--actions">
          <button type="button" id="desc-editor-save" class="description-editor-save" data-i18n="saveDescription">Save</button>
          <button type="button" id="desc-editor-cancel" class="description-editor-cancel" data-i18n="cancel">Cancel</button>
        </div>
      </div>

      <div class="editor-row editor-row--meta">
        <label class="editor-field editor-field--fixed">
          <span class="editor-field-label" data-i18n="castingTime">Cast</span>
          <input type="text" id="editor-cast-time" list="editor-casttime-presets" autocomplete="off" spellcheck="false">
          <datalist id="editor-casttime-presets">
            <option value="Aktion"></option>
            <option value="Reaktion"></option>
            <option value="Bonusaktion"></option>
          </datalist>
        </label>
        <label class="editor-field editor-field--fixed">
          <span class="editor-field-label" data-i18n="range">Range</span>
          <input type="text" id="editor-range" autocomplete="off" spellcheck="false">
        </label>
      </div>

      <div class="editor-row editor-row--meta">
        <label class="editor-field editor-field--fixed">
          <span class="editor-field-label" data-i18n="duration">Duration</span>
          <input type="text" id="editor-duration" autocomplete="off" spellcheck="false">
        </label>
        <label class="editor-field editor-field--fixed">
          <span class="editor-field-label" data-i18n="components">Comp.</span>
          <input type="text" id="editor-components" autocomplete="off" spellcheck="false" aria-describedby="editor-components-error">
          <span class="editor-field-error" id="editor-components-error" hidden></span>
        </label>
      </div>

      <div class="editor-row editor-row--description">
        <div class="description-editor-code-wrap">
          <pre class="description-editor-highlight" aria-hidden="true"><code id="desc-editor-highlight"></code></pre>
          <textarea id="desc-editor-textarea" class="description-editor-textarea" spellcheck="false"
            data-i18n-aria="descriptionHtml" aria-label="Description (HTML)"></textarea>
        </div>
        <div id="desc-editor-preview-mount" class="description-editor-preview-mount"></div>
        <aside class="description-editor-help" data-i18n="descriptionHelp"></aside>
      </div>

      <div class="editor-row editor-row--school">
        <label class="editor-field editor-field--fixed">
          <span class="editor-field-label" data-i18n="school">School</span>
          <select id="editor-school"></select>
        </label>
        <label class="editor-field editor-field--ritual">
          <input type="checkbox" id="editor-ritual">
          <span class="editor-field-label" data-i18n="ritual">Ritual</span>
        </label>
      </div>

      <div class="editor-row editor-row--classes">
        <span class="editor-field-label" data-i18n="classes">Classes</span>
        <div class="filter-chips" id="editor-class-chips" role="group" data-i18n-aria="classes"></div>
      </div>
    </div>
  </section>

  <div id="card-context-menu" class="card-context-menu" role="menu" hidden>
    <button type="button" class="card-context-menu-item" data-context-action="edit" data-i18n="editDescription" role="menuitem">Edit description</button>
  </div>

  <script src="vendor/papaparse.min.js"></script>
  <script src="vendor/purify.min.js"></script>
  <script src="js/util.js"></script>
  <script src="js/i18n.js"></script>
  <script src="js/filters.js"></script>
  <script src="js/sanitize.js"></script>
  <script src="js/csv.js"></script>
  <script src="js/borders.js"></script>
  <script src="js/render.js"></script>
  <script src="js/editor.js"></script>
  <script src="js/app.js"></script>
</body>
</html>
